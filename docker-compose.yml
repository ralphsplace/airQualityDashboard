services:
  app:
    build: .
    container_name: air-pollution-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      INDOOR_SOURCE_URL: ${INDOOR_SOURCE_URL}
      WAQI_URL: ${WAQI_URL:-https://api.waqi.info/feed/here/}
      WAQI_TOKEN: ${WAQI_TOKEN}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
      ENABLE_POLLER: ${ENABLE_POLLER:-true}
      HISTORY_DEFAULT_DAYS: ${HISTORY_DEFAULT_DAYS:-7}
      HISTORY_MAX_DAYS: ${HISTORY_MAX_DAYS:-30}
    ports:
      - "8009:8009"
    networks:
      - ai_stack
      
volumes:
  air_quality_postgres_data:

networks:
  ai_stack:
    driver: bridge